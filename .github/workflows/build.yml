name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: samuelahmed/shellsurf-main
          token: ${{ secrets.SOURCE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.ext == ''
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/shellsurf || true
          else
            strip target/${{ matrix.target }}/release/shellsurf || true
          fi

      - name: Package (Unix)
        if: matrix.ext == ''
        run: |
          cd target/${{ matrix.target }}/release
          tar czf shellsurf-${{ inputs.version }}-${{ matrix.target }}.tar.gz shellsurf

      - name: Package (Windows)
        if: matrix.ext == '.exe'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a shellsurf-${{ inputs.version }}-${{ matrix.target }}.zip shellsurf.exe

      - name: Upload artifact (Unix)
        if: matrix.ext == ''
        uses: actions/upload-artifact@v4
        with:
          name: shellsurf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/shellsurf-${{ inputs.version }}-${{ matrix.target }}.tar.gz

      - name: Upload artifact (Windows)
        if: matrix.ext == '.exe'
        uses: actions/upload-artifact@v4
        with:
          name: shellsurf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/shellsurf-${{ inputs.version }}-${{ matrix.target }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ inputs.version }} --yes 2>/dev/null || true
          gh release create ${{ inputs.version }} \
            --title "shellsurf ${{ inputs.version }}" \
            --notes "Install (macOS/Linux): \`curl -fsSL https://shellsurf.com/install.sh | sh\`" \
            artifacts/**/*
