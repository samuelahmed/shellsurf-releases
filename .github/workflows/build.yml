name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: samuelahmed/shellsurf-main
          token: ${{ secrets.SOURCE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/shellsurf || true

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf shellsurf-${{ inputs.version }}-${{ matrix.target }}.tar.gz shellsurf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shellsurf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/shellsurf-${{ inputs.version }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ inputs.version }} --yes 2>/dev/null || true
          gh release create ${{ inputs.version }} \
            --title "shellsurf ${{ inputs.version }}" \
            --notes "Install (macOS/Linux): \`curl -fsSL https://shellsurf.com/install.sh | sh\`" \
            artifacts/**/*
