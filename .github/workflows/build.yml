name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: shellsurf
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: shellsurf
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: shellsurf

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: samuelahmed/shellsurf-main
          token: ${{ secrets.SOURCE_PAT }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/shellsurf || true

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf shellsurf-${{ inputs.version }}-${{ matrix.target }}.tar.gz shellsurf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shellsurf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/shellsurf-${{ inputs.version }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if it exists
          gh release delete ${{ inputs.version }} --yes 2>/dev/null || true

          # Collect all tarballs
          find artifacts -name "*.tar.gz" -exec ls -la {} \;

          # Create release with all binaries
          gh release create ${{ inputs.version }} \
            --title "shellsurf ${{ inputs.version }}" \
            --notes "Install: \`curl -fsSL https://shellsurf.com/install.sh | sh\`" \
            artifacts/**/*.tar.gz
